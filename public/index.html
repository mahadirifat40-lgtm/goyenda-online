<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গোয়েন্দাগিরি অনলাইন</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --panel-glass: rgba(25, 30, 40, 0.95);
            --accent-crimson: #ff3344;
            --accent-gold: #e2b13c;
            --detective-blue: #0088ff;
            --text-glow: #f7fafc;
            --muted-gray: #a0aec0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: radial-gradient(circle, rgba(16,20,28,0.6) 0%, rgba(5,6,8,0.98) 100%), url('https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&q=80&w=1200') no-repeat center center fixed;
            background-size: cover; color: var(--text-glow); display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; 
        }
        .game-container { width: 100%; max-width: 600px; background: var(--panel-glass); backdrop-filter: blur(12px); border-radius: 16px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h1 { text-align: center; color: var(--accent-crimson); font-size: 2.2rem; margin-bottom: 5px; text-shadow: 0 0 15px rgba(255, 51, 68, 0.6); }
        .subtitle { text-align: center; font-size: 0.9rem; color: var(--muted-gray); margin-bottom: 25px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn { background: linear-gradient(135deg, var(--accent-crimson), #b31c28); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 1rem; }
        .btn-secondary { background: linear-gradient(135deg, #4a5568, #2d3748); }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background-color: rgba(20, 24, 33, 0.85); color: white; margin-bottom: 15px; font-size: 1rem; }
        label { color: var(--accent-gold); font-weight: 600; font-size: 0.95rem; display: block; margin-bottom: 6px; }
        .points-tab { background: rgba(15, 20, 30, 0.85); border: 1px solid rgba(226, 177, 60, 0.3); border-radius: 10px; padding: 12px; margin-bottom: 20px; }
        .clue-tag { background: rgba(0, 136, 255, 0.15); padding: 12px; border-radius: 8px; border-left: 5px solid var(--detective-blue); margin-bottom: 8px;}
        .player-hand-display { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px;}
        .hand-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 6px; }
        .hand-card { padding: 8px 4px; background: rgba(20, 24, 33, 0.9); border-radius: 6px; text-align: center; font-size: 0.8rem; font-weight: bold; }
        .footer-credit { text-align: center; margin-top: 25px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.4); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .footer-credit span { color: var(--accent-crimson); font-weight: bold; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="game-container">
    <h1>🩸 Goyendagiri Online 🔍</h1>
    <div class="subtitle">হত্য রহস্য ও সামাজিক অনুমান খেলা</div>

    <!-- LIVE SCOREBOARD -->
    <div id="global-scoreboard" class="points-tab" style="display: none;">
        <div style="color: var(--accent-gold); font-weight: bold; margin-bottom: 5px;">📊 রুম স্কোরবোর্ড (এই ম্যাচ)</div>
        <div id="points-list-box" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
    </div>

    <!-- SCREEN 1: QUICK JOIN -->
    <div id="screen-quick-join" class="screen active">
        <label>🕵️‍♂️ আপনার সুন্দর নাম লিখুন</label>
        <input type="text" id="username-input" placeholder="উদা: গোয়েন্দা লালু">
        
        <label>🔑 রুম কোড (নতুন বা পুরনো)</label>
        <input type="text" id="room-input" placeholder="উদা: DETECTIVE">
        
        <button class="btn" id="btn-join-room">রুমে প্রবেশ করুন 🚀</button>
    </div>

    <!-- SCREEN 2: WAITING LOBBY -->
    <div id="screen-lobby-wait" class="screen">
        <h3>🔑 রুম কোড: <span id="display-room-code" style="color:var(--accent-gold)"></span></h3>
        <p style="color: var(--muted-gray); font-size: 0.85rem; margin-top: 5px;">অন্তত ৩ জন প্লেয়ার দরকার খেলা শুরুর জন্য।</p>
        <div id="lobby-player-list" style="margin: 15px 0;"></div>
        <button class="btn" id="btn-start" style="display:none;">খেলা শুরু করুন 🎮</button>
        <button class="btn btn-secondary" onclick="leaveRoom()" style="margin-top: 10px;">রুম থেকে বের হন 🚪</button>
    </div>

    <!-- SCREEN 3: ROLE REVEAL -->
    <div id="screen-reveal" class="screen">
        <div class="reveal-box" id="reveal-box" onclick="toggleSecret()" style="background: rgba(255,255,255,0.05); border: 2px dashed var(--accent-gold); padding: 25px; text-align: center; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 15px;">👁️ গোপন পরিচয় দেখতে ট্যাপ করুন</div>
        <div id="secret-content" style="display:none; text-align:center;">
            <h2 id="my-role" style="margin-bottom:10px;"></h2>
            <h4 id="my-suspect-name" style="color:var(--accent-gold); margin-bottom:10px;"></h4>
            <p id="my-instruction" style="color:var(--muted-gray); margin-bottom:15px;"></p>
            <div id="killer-selection-zone" style="display:none;">
                <div id="killer-cards-options"></div>
            </div>
        </div>
    </div>

    <!-- SCREEN 4: GOYENDA DASHBOARD -->
    <div id="screen-goyenda" class="screen">
        <h3>🔍 গোয়েন্দা ড্যাশবোর্ড</h3>
        <p style="margin: 10px 0;">খুনি: <strong id="intel-killer" style="color:var(--accent-crimson)"></strong> | হাতিয়ার: <strong id="intel-card" style="color:var(--accent-gold)"></strong></p>
        <label>📍 স্থান</label>
        <select id="clue-1"><option>ড্রয়িং রুম</option><option>পরিত্যক্ত গুদামঘর</option><option>অন্ধকার গলি</option></select>
        <label>🧪 মৃত্যুর কারণ</label>
        <select id="clue-2"><option>ধারালো অস্ত্র</option><option>শ্বাসরোধ</option><option>বিষপ্রয়োগ</option></select>
        <label>🧥 ঘটনাস্থল</label>
        <select id="clue-3"><option>ধস্তাধস্তি</option><option>একদম পরিষ্কার</option><option>রক্তের ছিট ফোঁটা</option></select>
        <button class="btn" id="btn-send-clues">ক্লু প্রেরণ করুন 📡</button>
    </div>

    <!-- SCREEN 5: INVESTIGATION BOARD -->
    <div id="screen-investigation" class="screen">
        <h3>🕵️‍♂️ ফরেনসিক আলামত ও ফাইল</h3>
        <div id="live-clues-box" style="margin-bottom:15px;"></div>
        <div id="live-board-box"></div>
        <button class="btn" id="btn-go-vote">⚖️ চূড়ান্ত অভিযোগে যান</button>
    </div>

    <!-- SCREEN 6: VOTING -->
    <div id="screen-voting" class="screen">
        <h3>⚖️ চূড়ান্ত ভোট</h3>
        <label>🚨 খুনি কে?</label>
        <select id="vote-killer-select"></select>
        <label>🗡️ অপরাধের হাতিয়ার?</label>
        <select id="vote-card-select"></select>
        <button class="btn" id="btn-submit-vote">রায় পেশ করুন</button>
    </div>

    <!-- SCREEN 7: END GAME -->
    <div id="screen-game-over" class="screen" style="text-align:center;">
        <h2 id="end-title" style="margin-bottom:15px;"></h2>
        <div id="end-details" style="background:rgba(0,0,0,0.4); padding:15px; border-radius:10px; text-align:left; margin-bottom:15px;"></div>
        <div id="round-leaderboard-box" style="margin-bottom:15px; text-align:left;"></div>
        <button class="btn" id="btn-next-round">পরবর্তী রাউন্ড 🔄</button>
        <button class="btn btn-secondary" onclick="leaveRoom()" style="margin-top: 10px;">লবিতে ফিরুন 🚪</button>
    </div>

    <div class="footer-credit">Developed by <span>Mahadi Rifat</span></div>
</div>

<script>
    const socket = io();
    let currentRoom = null, loggedInUser = null;

    // --- Join Game Logic ---
    document.getElementById('btn-join-room').addEventListener('click', () => {
        const username = document.getElementById('username-input').value.trim();
        const roomCode = document.getElementById('room-input').value.trim();

        if(!username || !roomCode) {
            alert("দয়া করে আপনার নাম এবং রুম কোড দুটোই লিখুন!");
            return;
        }

        loggedInUser = username;
        currentRoom = roomCode.toUpperCase();
        
        socket.emit('joinRoom', { roomCode: currentRoom, username: loggedInUser });
        switchScreen('screen-lobby-wait');
        document.getElementById('global-scoreboard').style.display = 'block';
    });

    function leaveRoom() {
        location.reload(); // পেজ রিলোড করে সহজে রুম থেকে সম্পূর্ণ বের হয়ে যাওয়া যায়
    }

    // --- Socket Listeners ---
    socket.on('roomUpdated', (room) => {
        document.getElementById('display-room-code').innerText = room.code;
        
        // ম্যাচ স্কোরবোর্ড আপডেট
        document.getElementById('points-list-box').innerHTML = room.players.map(p => `
            <div style="background:rgba(255,255,255,0.05); padding:6px; border-radius:6px; font-size:0.85rem;">
                👤 ${p.username}: <strong>${p.points} Pts</strong>
            </div>
        `).join('');
        
        // ওয়েটিং লিস্ট আপডেট
        const list = document.getElementById('lobby-player-list');
        list.innerHTML = room.players.map(p => `
            <div style="padding:10px; background:rgba(255,255,255,0.05); margin-bottom:6px; border-radius:6px;">
                👤 ${p.username}
            </div>
        `).join('');
        
        // প্রথম প্লেয়ারকে হোস্ট বানিয়ে "শুরু" বাটন দেখানো (মিনিমাম ৩ জন হলে)
        if(room.players[0].username === loggedInUser && room.players.length >= 3) {
            document.getElementById('btn-start').style.display = 'block';
        } else {
            document.getElementById('btn-start').style.display = 'none';
        }
    });

    document.getElementById('btn-start').addEventListener('click', () => socket.emit('startGame', currentRoom));
    document.getElementById('btn-next-round').addEventListener('click', () => socket.emit('startGame', currentRoom));

    socket.on('gameUpdated', (room) => {
        const me = room.players.find(p => p.username === loggedInUser);
        if (room.state === 'role_reveal') { 
            switchScreen('screen-reveal'); 
            setupRevealScreen(me); 
        }
        else if (room.state === 'goyenda_clues') {
            if (me.role === 'Goyenda') {
                switchScreen('screen-goyenda');
                const killer = room.players.find(p => p.role === 'Killer');
                document.getElementById('intel-killer').innerText = killer.username;
                document.getElementById('intel-card').innerText = room.killerCard;
            } else {
                switchScreen('screen-reveal');
                document.getElementById('reveal-box').innerText = "🔍 প্রধান গোয়েন্দা আলামত সাজাচ্ছেন...";
                document.getElementById('secret-content').style.display = 'none';
            }
        } else if (room.state === 'investigation') { 
            switchScreen('screen-investigation'); 
            renderInvestigation(room); 
        }
    });

    let secretVisible = false;
    window.toggleSecret = function() {
        secretVisible = !secretVisible;
        document.getElementById('secret-content').style.display = secretVisible ? 'block' : 'none';
        document.getElementById('reveal-box').innerText = secretVisible ? "👁️ পরিচয় লুকাতে ট্যাপ করুন" : "👁️ গোপন পরিচয় দেখতে ট্যাপ করুন";
    };

    function setupRevealScreen(me) {
        secretVisible = false; 
        document.getElementById('secret-content').style.display = 'none';
        document.getElementById('reveal-box').innerText = "👁️ গোপন পরিচয় দেখতে ট্যাপ করুন";
        
        const roleEl = document.getElementById('my-role');
        const instEl = document.getElementById('my-instruction');
        
        if(me.role === 'Goyenda') {
            roleEl.innerText = '🔍 প্রধান গোয়েন্দা'; 
            roleEl.style.color = 'var(--detective-blue)';
            instEl.innerText = "আপনি মামলার প্রধান তদন্তকারী। খুনি নিজে কার্ড সিলেক্ট করার পর আপনার ড্যাশবোর্ডে ক্লু অপশন খুলে যাবে।";
            document.getElementById('killer-selection-zone').style.display = 'none';
        } else if (me.role === 'Killer') {
            roleEl.innerText = '🔪 আপনি খুনি (Killer)'; 
            roleEl.style.color = 'var(--accent-crimson)';
            instEl.innerText = "নিচের যেকোনো একটি কার্ড সিলেক্ট করে আপনার অপরাধের হাতিয়ার নির্ধারণ করুন:";
            const zone = document.getElementById('killer-cards-options');
            document.getElementById('killer-selection-zone').style.display = 'block';
            zone.innerHTML = me.cards.map(c => `<div class="btn" style="margin-top:5px;" onclick="socket.emit('killerPickCard', {roomCode:currentRoom, card:'${c}'})">🗡️ ${c}</div>`).join('');
        } else {
            roleEl.innerText = '👤 সন্দেহভাজন'; 
            roleEl.style.color = '#fff';
            instEl.innerText = "আপনি একজন নিরপরাধ নাগরিক। গোয়েন্দাকে সাহায্য করুন খুনি এবং সঠিক হাতিয়ার শনাক্ত করতে।";
            document.getElementById('killer-selection-zone').style.display = 'none';
        }
        document.getElementById('my-suspect-name').innerText = "আপনার চরিত্র: " + (me.assignedSuspectName || 'সন্দেহভাজন');
    }

    function renderInvestigation(room) {
        document.getElementById('live-clues-box').innerHTML = room.clues.map(c => `<div class="clue-tag"><strong>${c.label}:</strong> ${c.val}</div>`).join('');
        document.getElementById('live-board-box').innerHTML = room.players.filter(p => p.role !== 'Goyenda').map(p => `
            <div class="player-hand-display">
                <div style="font-weight: bold; margin-bottom: 4px;">👤 ${p.username} [${p.assignedSuspectName}]</div>
                <div class="hand-cards">${p.cards.map(c => `<div class="hand-card">${c}</div>`).join('')}</div>
            </div>
        `).join('');
        
        document.getElementById('vote-killer-select').innerHTML = room.players.filter(p => p.role !== 'Goyenda').map(p => `<option value="${p.id}">${p.username}</option>`).join('');
        let cardsHtml = "";
        room.players.filter(p => p.role !== 'Goyenda').forEach(p => p.cards.forEach(c => { cardsHtml += `<option value="${c}">${c}</option>`; }));
        document.getElementById('vote-card-select').innerHTML = cardsHtml;
    }

    document.getElementById('btn-send-clues').addEventListener('click', () => {
        const clues = [
            { label: '📍 স্থান', val: document.getElementById('clue-1').value },
            { label: '🧪 মৃত্যুর কারণ', val: document.getElementById('clue-2').value },
            { label: '🧥 ঘটনাস্থল', val: document.getElementById('clue-3').value }
        ];
        socket.emit('submitClues', { roomCode: currentRoom, clues });
    });

    document.getElementById('btn-go-vote').addEventListener('click', () => switchScreen('screen-voting'));
    
    document.getElementById('btn-submit-vote').addEventListener('click', () => {
        const accusedId = document.getElementById('vote-killer-select').value;
        const accusedCard = document.getElementById('vote-card-select').value;
        socket.emit('submitAccusation', { roomCode: currentRoom, accusedId, accusedCard });
    });

    socket.on('gameOver', ({ win, killer, killerCard, roomData, leaderboard }) => {
        switchScreen('screen-game-over');
        const title = document.getElementById('end-title');
        title.innerText = win ? "🏆 গোয়েন্দা জিতেছে!" : "💀 খুনি জিতে গেছে!";
        title.style.color = win ? "#48bb78" : "var(--accent-crimson)";
        document.getElementById('end-details').innerHTML = `<p><strong>খুনি ছিল:</strong> ${killer.username}</p><p><strong>হাতিয়ার:</strong> ${killerCard}</p>`;
        document.getElementById('round-leaderboard-box').innerHTML = leaderboard.map((p, i) => `<div>#${i+1} 👤 ${p.username} - ${p.points} Pts</div>`).join('');
        
        const nextBtn = document.getElementById('btn-next-round');
        if (roomData.players[0].username === loggedInUser) { 
            nextBtn.disabled = false; 
            nextBtn.innerText = "পরবর্তী রাউন্ড শুরু করুন 🔄"; 
        } else { 
            nextBtn.disabled = true; 
            nextBtn.innerText = "হোস্টের শুরুর অপেক্ষা... ⏳"; 
        }
    });

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
